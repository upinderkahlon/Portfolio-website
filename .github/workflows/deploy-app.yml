name: deploy flask app

on:
    workflow_dispatch:

jobs:
    deploy:
        env: 
            DOCKERHUB_USER: ${{vars.DOCKERHUB_USER}}
        runs-on: self-hosted
        steps:
            - name: Code Checkout
              uses: actions/checkout@v4

            - name: deploy with docker compose
              run: docker compose down && docker compose up -d --build --force-recreate
